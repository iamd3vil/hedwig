# Development configuration for Hedwig SMTP Server (filesystem storage)
# Used by `just run-fs` - runs locally

[server]
workers = 4
disable_outbound = true

# Plaintext listener on port 2526
[[server.listeners]]
addr = "0.0.0.0:2526"

[log]
level = "debug"
format = "fmt"

# Test credentials
[[server.auth]]
username = "test"
password = "test"

[storage]
storage_type = "fs"
base_path = "/tmp/hedwig-dev-fs/"

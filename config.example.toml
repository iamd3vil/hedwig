# Hedwig SMTP Server Configuration Example

[log]
level = "info" # Log level: error, warn, info, debug, trace
format = "fmt" # Log format: "fmt" or "json"

[server]
workers = 4              # Number of worker threads (optional)
max_retries = 5          # Maximum number of retries for deferred emails (optional, default: 5)
disable_outbound = false # Disable outbound email delivery (optional)
outbound_local = false   # Only allow local outbound delivery (optional)
helo_hostname = "mail.example.com" # Public FQDN to advertise in outbound HELO/EHLO (optional)
hostname = "mx.example.com" # Hostname announced in the inbound 220 greeting and EHLO reply (optional, default: OS hostname)
queue_buffer = 1000      # Inbound work queue buffer size (optional, default: 1000)
max_connections = 10000  # Max concurrent inbound connections (optional, default: 10000)
max_message_size = 26214400  # Max message size in bytes (optional, default: 25 MiB)
cmd_timeout = "5m"       # Idle timeout between SMTP commands (optional, default: 5m)
data_timeout = "10m"     # Timeout during DATA transfer (optional, default: 10m)

[server.smtp]
cache_size = 100         # Process-wide cache of destination MX transports (optional, default: 100)
min_idle = 2             # Minimum idle connections per MX pool, shared by all workers (optional, default: 2)
max_size = 10            # Maximum connections per MX pool, shared by all workers (optional, default: 10)

# MTA-STS (RFC 8461) is always active for outbound delivery.
# Hedwig automatically looks up and enforces recipient domain TLS policies.
# No configuration needed — it degrades gracefully if recipients don't publish policies.

# Optional Prometheus metrics endpoint
[server.metrics]
bind = "0.0.0.0:9090"

# Optional HTTP health endpoint for liveness probes
[server.health]
bind = "0.0.0.0:8080"

# Configure multiple listeners - each can be plaintext or TLS
# Standard SMTP port (plaintext)
[[server.listeners]]
addr = "0.0.0.0:25"

# SMTP submission port (STARTTLS: starts plaintext, upgrades when the
# client issues STARTTLS)
[[server.listeners]]
addr = "0.0.0.0:587"
[server.listeners.tls]
cert_path = "/etc/ssl/certs/smtp.crt"
key_path = "/etc/ssl/private/smtp.key"
mode = "starttls"

# SMTPS port (implicit TLS: the connection is TLS from the first byte)
[[server.listeners]]
addr = "0.0.0.0:465"
[server.listeners.tls]
cert_path = "/etc/ssl/certs/smtp.crt"
key_path = "/etc/ssl/private/smtp.key"
mode = "implicit" # default when omitted

# Local testing port (plaintext)
[[server.listeners]]
addr = "127.0.0.1:2525"

# Optional SMTP authentication (can have multiple users)
[[server.auth]]
username = "user1"
password = "password1"

[[server.auth]]
username = "user2"
password = "password2"

# Optional DKIM configuration
[server.dkim]
domain = "example.com"
selector = "default"
private_key = "/etc/hedwig/dkim/private.key"
key_type = "rsa"                             # "rsa" or "ed25519"

# Storage configuration
[storage]
storage_type = "fs"         # "fs" for filesystem, "sqlite" for SQLite-backed storage
base_path = "/var/lib/hedwig/mail"

# SQLite storage example (num_shards/batch_* live under [storage], tuning under [storage.sqlite]):
# [storage]
# storage_type = "sqlite"
# base_path = "/var/lib/hedwig/mail"
# num_shards = 16           # Number of database shards (default: 16)
# batch_size = 100          # Write-batch size (default: 100)
# batch_timeout_ms = 5      # Max time (ms) to wait before flushing a batch (default: 5)
#
# [storage.sqlite]
# synchronous = "NORMAL"    # SQLite synchronous setting: OFF | NORMAL | FULL (default: NORMAL)
# cache_size_mb = 1600      # Page-cache size per shard in MiB (default: 1600)
# busy_timeout_ms = 5000    # SQLite busy-timeout in ms (default: 5000)
# pool_max_connections = 10 # sqlx pool max connections per shard (default: 10)

# Optional retention policy for local spool cleanup
[storage.cleanup]
bounced_retention = "7d"
deferred_retention = "2d"
interval = "1h"

# Optional email filters
[[filters]]
type = "from_domain_filter"
domain = ["allowed-domain.com", "another-domain.com"]
action = "allow"

[[filters]]
type = "to_domain_filter"
domain = ["blocked-domain.com"]
action = "deny"

releases:
  - name: "Release to github"
    dist_folder: "./dist"
    targets:
      github:
        owner: "iamd3vil"
        repo: "hedwig"
    checksum:
      algorithm: "sha256"
    additional_files:
      - "README.md"
      - "LICENSE"
    builds:
      - command: "just build-linux"
        artifact: "target/x86_64-unknown-linux-musl/release/hedwig"
        bin_name: "hedwig"
        archive_name: "hedwig-{{ meta.tag }}-linux-x86_64"
        name: "Linux build"
changelog:
  format: "github"
  template: "changelog.tpl"
  exclude:
    - "^doc:"
